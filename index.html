<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--accent:#7c3aed;--accent2:#a855f7;--accent3:#06b6d4;--text:#f1f1f1;--muted:#888;--card:#16161f;--border:#2a2a3a}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.nav-links{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:.2s}
.nav-btn:hover,.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.hero{text-align:center;padding:70px 20px 40px;background:radial-gradient(ellipse at top,#1a0a2e 0%,transparent 60%)}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--accent2) 50%,var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.hero p{color:var(--muted);font-size:1.1rem;max-width:560px;margin:0 auto 36px}
.search-wrap{max-width:600px;margin:0 auto 60px;position:relative;padding:0 20px}
.search-wrap input{width:100%;padding:16px 56px 16px 20px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:1rem;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;right:36px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.2rem}
.search-results{display:none;max-width:1400px;margin:-50px auto 40px;padding:0 24px}
.search-results.active{display:block}
.sr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.section-title{text-align:center;font-size:1.5rem;font-weight:700;margin-bottom:28px}
.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:0 24px 60px;max-width:1400px;margin:0 auto}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;cursor:pointer;transition:.25s;text-align:center;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent3));opacity:0;transition:.25s}
.cat-card:hover::before{opacity:.08}
.cat-card:hover{border-color:var(--accent2);transform:translateY(-3px);box-shadow:0 8px 30px rgba(168,85,247,.15)}
.cat-icon{font-size:2.2rem;margin-bottom:12px;display:block}
.cat-name{font-weight:700;font-size:1rem;margin-bottom:6px}
.cat-count{color:var(--muted);font-size:.8rem}
#cat-view{display:none;padding:30px 24px 60px;max-width:1400px;margin:0 auto}
.cat-header{margin-bottom:32px}
.cat-header h2{font-size:2rem;font-weight:800;margin-bottom:8px}
.cat-header p{color:var(--muted)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:.25s;display:flex;flex-direction:column;gap:10px}
.tool-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(168,85,247,.12)}
.tool-top{display:flex;align-items:center;gap:12px}
.tool-emoji{font-size:1.6rem;width:44px;height:44px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tool-name{font-weight:700;font-size:1rem}
.tool-tag{font-size:.7rem;color:var(--accent2);background:rgba(168,85,247,.1);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:2px}
.tool-desc{color:#aaa;font-size:.85rem;line-height:1.5;flex:1}
.tool-btn{display:inline-block;margin-top:6px;padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;color:#fff;font-size:.85rem;font-weight:600;text-align:center;transition:.2s;border:none;cursor:pointer}
.tool-btn:hover{opacity:.85;transform:scale(1.02)}
#static-view{display:none;max-width:860px;margin:0 auto;padding:40px 24px 80px}
#static-view h1{font-size:2rem;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#static-view .updated{color:var(--muted);font-size:.85rem;margin-bottom:32px}
#static-view h2{font-size:1.2rem;font-weight:700;margin:28px 0 10px;color:var(--accent2)}
#static-view p{color:#bbb;line-height:1.8;margin-bottom:12px;font-size:.95rem}
#static-view a{color:var(--accent2)}
.about-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin:20px 0}
.about-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center}
.about-card .icon{font-size:2rem;margin-bottom:10px}
.about-card h3{font-weight:700;margin-bottom:6px}
.about-card p{color:var(--muted);font-size:.85rem}
.contact-form{margin-top:24px;display:flex;flex-direction:column;gap:14px}
.contact-form input,.contact-form textarea{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:.95rem;outline:none;transition:.2s;font-family:inherit}
.contact-form input:focus,.contact-form textarea:focus{border-color:var(--accent2)}
.contact-form textarea{min-height:140px;resize:vertical}
.contact-form button{padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
footer{text-align:center;padding:30px 20px;color:var(--muted);font-size:.85rem;border-top:1px solid var(--border)}
.footer-links{display:flex;justify-content:center;gap:20px;margin-bottom:12px;flex-wrap:wrap}
.footer-links span{cursor:pointer;transition:.2s}
.footer-links span:hover{color:var(--accent2)}
@media(max-width:600px){.cats-grid{grid-template-columns:repeat(2,1fr)}.tools-grid{grid-template-columns:1fr}}
</style>

const catsGrid=document.getElementById('catsGrid');
CATEGORIES.forEach(cat=>{
  const el=document.createElement('div');
  el.className='cat-card';
  el.innerHTML=`<span class="cat-icon">${cat.icon}</span><div class="cat-name">${cat.name}</div><div class="cat-count">${cat.tools.length} tools</div>`;
  el.onclick=()=>showCategory(cat.id);
  catsGrid.appendChild(el);
});

function setNav(id){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));if(id)document.getElementById(id)?.classList.add('active')}
function showCategory(id){
  const cat=CATEGORIES.find(c=>c.id===id);if(!cat)return;
  document.getElementById('home-view').style.display='none';
  document.getElementById('cat-view').style.display='block';
  document.getElementById('static-view').style.display='none';
  setNav('navHome');
  document.getElementById('catTitle').textContent=cat.icon+' '+cat.name;
  document.getElementById('catDesc').textContent=cat.desc;
  const grid=document.getElementById('toolsGrid');grid.innerHTML='';
  cat.tools.forEach(t=>{
    const el=document.createElement('div');el.className='tool-card';
    el.innerHTML=`<div class="tool-top"><div class="tool-emoji">${t.emoji}</div><div><div class="tool-name">${t.name}</div><span class="tool-tag">${cat.name}</span></div></div><div class="tool-desc">${t.desc}</div><a href="${t.url}" target="_blank" rel="noopener" class="tool-btn">Visit Tool →</a>`;
    grid.appendChild(el);
  });
  window.scrollTo(0,0);
}
function showHome(){
  document.getElementById('home-view').style.display='block';
  document.getElementById('cat-view').style.display='none';
  document.getElementById('static-view').style.display='none';
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').classList.remove('active');
  setNav('navHome');window.scrollTo(0,0);
}
function showStatic(page){
  document.getElementById('home-view').style.display='none';
  document.getElementById('cat-view').style.display='none';
  const sv=document.getElementById('static-view');sv.style.display='block';sv.innerHTML=STATIC_PAGES[page]||'';
  const map={about:'navAbout',privacy:'navPrivacy',contact:'navContact'};
  setNav(map[page]);window.scrollTo(0,0);
}
function submitContact(){
  const n=document.getElementById('cName').value,e=document.getElementById('cEmail').value,m=document.getElementById('cMsg').value;
  if(!n||!e||!m){alert('Please fill in all fields!');return;}
  alert('Thank you '+n+'! Your message has been received.');
  ['cName','cEmail','cSubject','cMsg'].forEach(id=>document.getElementById(id).value='');
}
function doSearch(q){
  const sr=document.getElementById('searchResults'),srGrid=document.getElementById('srGrid'),srTitle=document.getElementById('srTitle');
  if(!q||q.trim().length<2){sr.classList.remove('active');return;}
  const query=q.toLowerCase(),results=[];
  CATEGORIES.forEach(cat=>cat.tools.forEach(t=>{
    if(t.name.toLowerCase().includes(query)||t.desc.toLowerCase().includes(query)||cat.name.toLowerCase().includes(query))
      results.push({...t,catName:cat.name,catIcon:cat.icon});
  }));
  srGrid.innerHTML='';
  srTitle.textContent=results.length?`${results.length} tools found for "${q}"`:` No tools found for "${q}"`;
  results.slice(0,24).forEach(t=>{
    const el=document.createElement('div');el.className='tool-card';
    el.innerHTML=`<div class="tool-top"><div class="tool-emoji">${t.emoji}</div><div><div class="tool-name">${t.name}</div><span class="tool-tag">${t.catIcon} ${t.catName}</span></div></div><div class="tool-desc">${t.desc}</div><a href="${t.url}" target="_blank" rel="noopener" class="tool-btn">Visit Tool →</a>`;
    srGrid.appendChild(el);
  });
  sr.classList.add('active');
}
</script>
</body>
</html>
